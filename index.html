<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SolarToAll Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>☀️ SolarToAll Calculator</h1>

    <label>Monthly Electricity Bill (₹)</label>
    <input type="number" id="bill" placeholder="Enter your bill">

    <label>Location</label>
    <input type="text" id="location" placeholder="City (optional)">

    <button onclick="calculateSolar()">Calculate</button>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
